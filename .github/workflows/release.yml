name: release

on:
  push:
    tags:
      - "v*"

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  windows:
    needs: guard-main
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install packaging tools
        run: choco install nsis imagemagick -y
      - name: Build installer
        shell: pwsh
        run: scripts/release/build-windows.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: dist/release/windows-x86_64-pc-windows-gnu

  macos:
    needs: guard-main
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build dmg
        run: TARGET=${{ matrix.target }} scripts/release/build-macos.sh
      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}
          path: dist/release/macos-${{ matrix.target }}

  linux:
    needs: guard-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libasound2-dev libudev-dev cmake pkg-config
      - name: Build linux package
        run: scripts/release/build-linux.sh
      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: dist/release/linux-x86_64-unknown-linux-gnu
